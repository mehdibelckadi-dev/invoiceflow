[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --frozen-lockfile"]
dependsOn = ["setup"]

[phases.build]
cmds = ["pnpm --filter @lefse/shared build && pnpm --filter @lefse/api build"]
dependsOn = ["install"]

[start]
cmd = "node apps/api/dist/index.js"
